<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      #chat-container { max-width: 600px; margin: 20px auto; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
      #messages { flex: 1; overflow-y: auto; padding: 10px; background: #f4f7f6; display: flex; flex-direction: column; }
      .message { margin-bottom: 12px; padding: 10px 14px; border-radius: 12px; max-width: 75%; position: relative; }
      .my-message { align-self: flex-end; background-color: #dcf8c6; border-bottom-right-radius: 2px; }
      .other-message { align-self: flex-start; background-color: #fff; border-bottom-left-radius: 2px; border: 1px solid #e0e0e0; }
      .time { font-size: 0.75rem; color: #888; margin-top: 4px; display: block; text-align: right; }
      #input-area { display: flex; padding: 12px; border-top: 1px solid #ddd; background: #fff; }
      #messageInput { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
      #btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; margin-left: 5px; cursor: pointer; }
      #btn:hover { background: #0056b3; }
      h2 { text-align: center; color: #333; }
    </style>
  </head>
  <body>
    <h2>Socket.io Chat</h2>

    <div id="chat-container">
      <div id="messages"></div>
      <div id="input-area">
        <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off" />
        <button id="btn">Send</button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
          const socket = io();
          const btn = document.getElementById('btn');
          const messageInput = document.getElementById('messageInput');
          const allMessages = document.getElementById('messages');

          socket.on("message", (data) => {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            
            // Check if I sent the message
            if (data.id === socket.id) {
              messageElement.classList.add('my-message');
            } else {
              messageElement.classList.add('other-message');
            }

            messageElement.innerHTML = `
                <div>${data.text}</div>
                <span class="time">${data.time}</span>
            `;

            allMessages.appendChild(messageElement);
            allMessages.scrollTop = allMessages.scrollHeight;
          });
          
          function sendMessage() {
            const message = messageInput.value;
            if (message.trim()) {
              socket.emit('user message', message);
              messageInput.value = '';
            }
          }

          btn.addEventListener('click', sendMessage);
          
          messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
              sendMessage();
            }
          });
    </script>
  </body>
</html>
